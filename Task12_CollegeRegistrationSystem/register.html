<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gulf College - Register</title>
</head>
<body id="top">
    <header>
        <img src="images/logo.webp" alt="Gulf College logo" width="90">
        <h1>Gulf College</h1>
        <nav aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="programs.html">Programs</a>
            <a href="schedule.html">Schedule</a>
            <a href="register.html">Register</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Student Registration Form</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Personal Information</legend>
                    <p><label for="full-name">Full Name:</label><input type="text" id="full-name" name="full_name" required></p>
                    <p><label for="student-id">Student ID:</label><input type="text" id="student-id" name="student_id"></p>
                    <p><label for="dob">Date of Birth:</label><input type="date" id="dob" name="date_of_birth"></p>
                    <p>Gender:
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="male"> Male</label>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Contact and Program Details</legend>
                    <p><label for="email">Email Address:</label><input type="email" id="email" name="email" required></p>
                    <p><label for="phone">Phone Number:</label><input type="tel" id="phone" name="phone"></p>
                    <p>
                        <label for="program">Program Selection:</label>
                        <select id="program" name="program">
                            <option value="bis">Business Information Systems</option>
                            <option value="it">Information Technology</option>
                            <option value="accounting">Accounting</option>
                            <option value="marketing">Marketing</option>
                        </select>
                    </p>
                    <p><label for="address">Address:</label><textarea id="address" name="address" rows="4" cols="35"></textarea></p>
                    <p><label><input type="checkbox" name="terms" required> I agree to the terms and conditions.</label></p>
                </fieldset>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Gulf College. Email: <a href="mailto:admissions@Gulfcollege.edu">admissions@Gulfcollege.edu</a> | Academic Year: 2026/2027</p>
        <p><a href="index.html">Home</a> | <a href="contact.html">Contact</a></p>
        <p><a href="#top">Back to Top</a></p>
    </footer>
</body>
</html>
