<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechSolutions - Contact</title>
</head>
<body id="top">
    <header>
        <img src="images/logo.jpg" alt="TechSolutions logo" width="90">
        <h1>TechSolutions</h1>
        <nav aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact Us</h2>
            <p>Email: <a href="mailto:info@techsolutions.com">info@techsolutions.com</a></p>
            <form action="#" method="post">
                <p><label for="fullname">Full Name:</label><input type="text" id="fullname" name="fullname" required></p>
                <p><label for="email">Email Address:</label><input type="email" id="email" name="email" required></p>
                <p><label for="phone">Phone Number:</label><input type="tel" id="phone" name="phone"></p>
                <p>
                    <label for="service">Service Selection:</label>
                    <select id="service" name="service">
                        <option value="website">Website Design</option>
                        <option value="support">IT Support</option>
                        <option value="cloud">Cloud Consultation</option>
                    </select>
                </p>
                <p><label for="message">Message:</label><textarea id="message" name="message" rows="5" cols="35"></textarea></p>
                <button type="submit">Submit</button>
            </form>
        </section>
        <aside>
            <h2>Company Announcements</h2>
            <ul>
                <li>Support line is open Sunday to Thursday.</li>
                <li>New customers can request a free meeting.</li>
            </ul>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 TechSolutions. Email: <a href="mailto:info@techsolutions.com">info@techsolutions.com</a></p>

        <p><a href="#top">Back to Top</a></p>
    </footer>
